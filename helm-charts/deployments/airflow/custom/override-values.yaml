resources:
  container:
    tools:
      requests:
        memory: "500Mi"
        cpu: "500m"
      limits:
        memory: "1Gi"
        cpu: "1"
    primary:
      requests:
        memory: "10Gi"
        cpu: "2"
      limits:
        memory: "15Gi"
        cpu: "4"
acd_variables:
  RETRIES_NUM: 0
  add_host_aliases: "Y"
  AIRFLOW_WEBSERVER_CONFIG_CUSTOMIZATION: "True"
env_variables:
  shared_pbin_path: "/tc_nfs/int01/SHARED_PBIN"
  apply_pf_from_shared_pbin: "Y"
  # Ping/OIDC overrides — survive entrypoint regeneration of airflow.cfg
  # Keys are upper-cased by the chart, becoming AIRFLOW__<SECTION>__<KEY>
  AIRFLOW__CORE__AUTH_MANAGER: "airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager"
  AIRFLOW__WEBSERVER__BASE_URL: "https://airflow.int.corp.amdocs.azr"
  AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX: "True"
  AIRFLOW__AMDOCS_OAUTH__AMDOCS_OAUTH_ENABLED: "True"
