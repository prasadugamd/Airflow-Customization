{{- $has_udpports := false }}
{{- if and (hasKey .Values.service "udpports") (hasKey .Values.service.udpports "ports") }}
{{- $has_udpports = ternary true false (gt (len (.Values.service.udpports.ports | default "")) 0 ) }}
{{- end }}
{{- $has_cust_udpports := ternary true false (gt (len (.Values.service.custom_udpports | default "")) 0 ) }}
{{- if or $has_udpports $has_cust_udpports }}
{{- $work_with_external_ips := .Values.acd_variables.work_with_external_ips | default "N" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.app.name }}-srv-udp
  labels:
     app: {{ .Values.app.name }}
{{- if and (eq .Values.service.tcpports.type "LoadBalancer") (eq $work_with_external_ips "N") }}
  annotations:

{{- if .Values.service_annotations.global }}
{{ toYaml .Values.service_annotations.global | indent 4 }}
{{- end }}

{{- if .Values.service_annotations.udp }}
{{ toYaml .Values.service_annotations.udp | indent 4 }}
{{- end }}

{{- end }}
spec:
  type: {{ .Values.service.udpports.type }}
  ports:
{{- if $has_udpports }}
{{ toYaml .Values.service.udpports.ports | indent 2 }}
{{- end }}

{{- if $has_cust_udpports }}
{{ toYaml .Values.service.custom_udpports.ports | indent 2 }}
{{- end}}

  selector:
    app: {{ .Values.app.name }}
{{- if ne .Values.service.udpports.type "ClusterIP" }}
  {{- if .Values.acd_service_variables.externalTrafficPolicy }}
  externalTrafficPolicy: {{ .Values.acd_service_variables.externalTrafficPolicy }}
  {{- end }}
  {{- if eq $work_with_external_ips "Y" }}
  externalIPs:
  {{- range $value := .Values.acd_service_variables.externalips }}
   - "{{ $value }}"
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
